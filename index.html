<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator | Bilingual EN/ES</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0b0b0b;
            color: #e8e8e8;
            min-height: 100vh;
        }

        /* ---- App Shell ---- */
        .app-header {
            padding: 24px 32px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .app-title span {
            color: #8a9a7b;
        }

        .app-subtitle {
            font-size: 13px;
            color: #888;
        }

        .app-layout {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        /* ---- Sidebar / Form ---- */
        .form-panel {
            width: 380px;
            min-width: 380px;
            border-right: 1px solid #222;
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 73px);
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8a9a7b;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #8a9a7b;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-print {
            width: 100%;
            padding: 12px;
            background: #8a9a7b;
            color: #0b0b0b;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-print:hover {
            opacity: 0.85;
        }

        /* ---- Preview Panel ---- */
        .preview-panel {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            max-height: calc(100vh - 73px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .invoice-wrapper {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* ---- Invoice Styles (white background document) ---- */
        .invoice-container {
            width: 100%;
            background: white;
            color: #333;
            font-family: Arial, sans-serif;
            font-size: 12px;
            line-height: 1.4;
            border: 2px solid #000;
        }

        .inv-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px;
            border-bottom: 2px solid #000;
        }

        .inv-company-info { flex: 1; }

        .inv-company-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #000;
        }

        .inv-company-details {
            font-size: 14px;
            line-height: 1.3;
            color: #333;
        }

        .inv-title-block {
            flex: 1;
            text-align: right;
        }

        .inv-title-block h1 {
            font-size: 36px;
            margin: 0;
            font-weight: bold;
            color: #000;
        }

        .inv-meta {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .inv-meta-box {
            border: 2px solid #000;
            padding: 8px 12px;
            text-align: center;
            min-width: 80px;
        }

        .inv-meta-label {
            font-weight: bold;
            font-size: 14px;
            color: #000;
        }

        .inv-meta-value {
            font-size: 14px;
            margin-top: 2px;
            color: #333;
        }

        .inv-bill-to {
            padding: 20px;
            border-bottom: 2px solid #000;
        }

        .inv-bill-to-header {
            background: #000;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }

        .inv-bill-to-content {
            border: 2px solid #000;
            padding: 15px;
            font-size: 14px;
            line-height: 1.4;
            color: #333;
        }

        .inv-terms-section {
            display: flex;
            justify-content: flex-end;
            padding: 0 20px;
            margin-bottom: 20px;
            margin-top: 15px;
        }

        .inv-terms-box {
            display: flex;
            border: 2px solid #000;
        }

        .inv-terms-label,
        .inv-due-date-label {
            background: #f0f0f0;
            padding: 8px 12px;
            font-weight: bold;
            border-right: 2px solid #000;
            text-align: center;
            color: #000;
        }

        .inv-terms-value,
        .inv-due-date-value {
            padding: 8px 12px;
            text-align: center;
            min-width: 100px;
            color: #333;
        }

        .inv-due-date-label {
            border-left: 2px solid #000;
        }

        .inv-items-table {
            width: calc(100% - 40px);
            border-collapse: collapse;
            margin: 0 20px 20px 20px;
        }

        .inv-items-table th {
            background: #f0f0f0;
            border: 2px solid #000;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: #000;
        }

        .inv-items-table td {
            border: 2px solid #000;
            padding: 10px;
            vertical-align: top;
            color: #333;
        }

        .inv-desc-cell {
            text-align: left;
            width: 50%;
        }

        .inv-num-cell {
            text-align: center;
            width: 12.5%;
        }

        .inv-amt-cell {
            text-align: right;
            width: 12.5%;
        }

        .inv-totals-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
        }

        .inv-payment-info {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
            color: #000;
        }

        .inv-banking-details {
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.3;
            font-weight: normal;
            color: #333;
        }

        .inv-totals-table {
            border-collapse: collapse;
        }

        .inv-totals-table td {
            border: 2px solid #000;
            padding: 8px 15px;
            font-size: 16px;
            color: #333;
        }

        .inv-totals-label {
            background: #f0f0f0;
            font-weight: bold;
            text-align: center;
            color: #000;
        }

        .inv-totals-amount {
            text-align: right;
            min-width: 120px;
        }

        .inv-balance-due {
            font-weight: bold;
            font-size: 18px;
            color: #000;
        }

        /* ---- Responsive ---- */
        @media (max-width: 900px) {
            .app-layout {
                flex-direction: column;
            }
            .form-panel {
                width: 100%;
                min-width: 0;
                max-height: none;
                border-right: none;
                border-bottom: 1px solid #222;
            }
            .preview-panel {
                max-height: none;
                padding: 24px 16px;
            }
        }

        /* ---- Print Styles ---- */
        @media print {
            body {
                background: white;
            }

            .app-header,
            .form-panel {
                display: none !important;
            }

            .app-layout {
                display: block;
            }

            .preview-panel {
                padding: 0;
                max-height: none;
                overflow: visible;
            }

            .invoice-wrapper {
                box-shadow: none;
                border-radius: 0;
                max-width: none;
            }

            .invoice-container {
                border: 1px solid #000;
            }

            @page {
                size: A4;
                margin: 0.5in;
            }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div>
        <div class="app-title">Invoice Generator <span>.</span></div>
        <div class="app-subtitle">Bilingual EN/ES for cross-border consulting</div>
    </div>
    <button class="btn-print" style="width: auto; padding: 10px 24px;" onclick="window.print()">Print / Save PDF</button>
</header>

<div class="app-layout">
    <aside class="form-panel">

        <div class="form-section">
            <div class="form-section-title">Invoice Details</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Invoice Number</label>
                    <input type="text" id="invoiceNumber" value="INV-001" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" id="invoiceDate" value="3/1/2026" oninput="updatePreview()">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="text" id="dueDate" value="3/15/2026" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Terms</label>
                    <input type="text" id="terms" value="Net 15" oninput="updatePreview()">
                </div>
            </div>
            <div class="form-group">
                <label>Service Period</label>
                <input type="text" id="servicePeriod" value="March 1-31, 2026" oninput="updatePreview()">
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Line Item</div>
            <div class="form-group">
                <label>Description (EN)</label>
                <textarea id="descriptionEn" rows="3" oninput="updatePreview()">Professional Consulting Services</textarea>
            </div>
            <div class="form-group">
                <label>Description (ES)</label>
                <textarea id="descriptionEs" rows="3" oninput="updatePreview()">Servicios Profesionales de Consultoria</textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Rate (USD)</label>
                    <input type="number" id="rate" value="1500" step="0.01" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" value="1" step="0.01" oninput="updatePreview()">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Your Company</div>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" id="companyName" value="YOUR NAME HERE" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Company Details</label>
                <textarea id="companyAddress" rows="4" oninput="updatePreview()">Servicios Digitales y Consultoria
Digital Services &amp; Consulting
123 Main Street, Suite A
City, State 12345
Ph. (555) 000-0000
RFC: XXXXXXXXXXX</textarea>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Bill To</div>
            <div class="form-group">
                <label>Client Name and Address</label>
                <textarea id="billTo" rows="4" oninput="updatePreview()">Client Corp S.A. de C.V.
456 Business Avenue, Suite B1
Colonia Centro
City, State, Country 00000
RFC: XXXXXXXXXXX</textarea>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Payment Details</div>
            <div class="form-group">
                <label>Banking / Wire Info</label>
                <textarea id="bankingDetails" rows="5" oninput="updatePreview()">Banco / Bank: Example Bank
Cuenta / Account: Your Name
No. de Cuenta / Account #: XXXX-XXXX-XXXX
Routing #: XXXXXXXXX
Swift: XXXXXXXXX

Correo / Email: you@example.com</textarea>
            </div>
        </div>

        <button class="btn-print" onclick="window.print()">Print / Save PDF</button>

    </aside>

    <main class="preview-panel">
        <div class="invoice-wrapper">
            <div class="invoice-container" id="invoicePreview">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>
</div>

<script>
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function nl2br(text) {
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function formatCurrency(num) {
        return '$' + Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatQty(num) {
        const n = Number(num);
        return n === Math.floor(n) ? String(Math.floor(n)) : String(n);
    }

    function updatePreview() {
        const invoiceNumber = document.getElementById('invoiceNumber').value;
        const invoiceDate = document.getElementById('invoiceDate').value;
        const dueDate = document.getElementById('dueDate').value;
        const terms = document.getElementById('terms').value;
        const servicePeriod = document.getElementById('servicePeriod').value;
        const descEn = document.getElementById('descriptionEn').value;
        const descEs = document.getElementById('descriptionEs').value;
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const quantity = parseFloat(document.getElementById('quantity').value) || 0;
        const companyName = document.getElementById('companyName').value;
        const companyAddress = document.getElementById('companyAddress').value;
        const billTo = document.getElementById('billTo').value;
        const bankingDetails = document.getElementById('bankingDetails').value;

        const total = rate * quantity;
        const rateFmt = formatCurrency(rate);
        const totalFmt = formatCurrency(total);
        const qtyFmt = formatQty(quantity);

        document.getElementById('invoicePreview').innerHTML = `
            <div class="inv-header">
                <div class="inv-company-info">
                    <div class="inv-company-name">${escapeHtml(companyName)}</div>
                    <div class="inv-company-details">${nl2br(companyAddress)}</div>
                </div>
                <div class="inv-title-block">
                    <h1>Factura / Invoice</h1>
                    <div class="inv-meta">
                        <div class="inv-meta-box">
                            <div class="inv-meta-label">Fecha / Date</div>
                            <div class="inv-meta-value">${escapeHtml(invoiceDate)}</div>
                        </div>
                        <div class="inv-meta-box">
                            <div class="inv-meta-label">Factura #</div>
                            <div class="inv-meta-value">${escapeHtml(invoiceNumber)}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="inv-bill-to">
                <div class="inv-bill-to-header">Facturar a / Bill To</div>
                <div class="inv-bill-to-content">${nl2br(billTo)}</div>
            </div>

            <div class="inv-terms-section">
                <div class="inv-terms-box">
                    <div class="inv-terms-label">Terminos / Terms</div>
                    <div class="inv-terms-value">${escapeHtml(terms)}</div>
                    <div class="inv-due-date-label">Fecha Limite / Due Date</div>
                    <div class="inv-due-date-value">${escapeHtml(dueDate)}</div>
                </div>
            </div>

            <table class="inv-items-table">
                <thead>
                    <tr>
                        <th>Fecha / Date</th>
                        <th>Descripcion / Description</th>
                        <th>Cantidad / Qty</th>
                        <th>Tarifa / Rate</th>
                        <th>Monto / Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="inv-num-cell">${escapeHtml(invoiceDate)}</td>
                        <td class="inv-desc-cell">
                            <strong>${escapeHtml(descEs)} | ${escapeHtml(servicePeriod)}</strong><br>
                            <strong>${escapeHtml(descEn)} | ${escapeHtml(servicePeriod)}</strong><br><br>
                            Servicios profesionales de consultoría incluyendo:<br>
                            Professional consulting services including:<br><br>
                            &bull; Análisis y reporte / Analysis and reporting<br>
                            &bull; Gestión de proyecto / Project management<br>
                            &bull; Soporte técnico / Technical support<br>
                            &bull; Documentación y entregables / Documentation and deliverables<br><br>
                            <em>Periodo de servicio / Service Period: ${escapeHtml(servicePeriod)}</em><br>
                            <em>Referencia / Contract Reference: Service Agreement</em>
                        </td>
                        <td class="inv-num-cell">${qtyFmt}</td>
                        <td class="inv-amt-cell">${rateFmt}</td>
                        <td class="inv-amt-cell">${totalFmt}</td>
                    </tr>
                </tbody>
            </table>

            <div class="inv-totals-section">
                <div class="inv-payment-info">
                    <strong>Datos Bancarios / Wire Transfer Details:</strong>
                    <div class="inv-banking-details">${nl2br(bankingDetails)}</div>
                </div>
                <table class="inv-totals-table">
                    <tr>
                        <td class="inv-totals-label">Subtotal / Subtotal</td>
                        <td class="inv-totals-amount">${totalFmt}</td>
                    </tr>
                    <tr>
                        <td class="inv-totals-label">Saldo / Amount Due (USD)</td>
                        <td class="inv-totals-amount inv-balance-due">${totalFmt}</td>
                    </tr>
                </table>
            </div>
        `;
    }

    // Initial render
    updatePreview();
</script>

</body>
</html>
